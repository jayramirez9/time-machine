// ── Event log ────────────────────────────────────────────────
const eventLogLines = [];
function logEvent(name, detail) {
  const time = new Date().toLocaleTimeString('en', { hour12: false });
  eventLogLines.unshift({ time, name, detail });
  if (eventLogLines.length > 50) eventLogLines.length = 50;
  eventLogEl.innerHTML = eventLogLines.slice(0, 15).map(e =>
    `<div><span class="time">${e.time}</span> <span class="name">${e.name}</span> ${e.detail || ''}</div>`
  ).join('');
}

// ── Audition panel ──────────────────────────────────────────
document.getElementById('auditionToggle').addEventListener('click', function () {
  this.classList.toggle('open');
  document.getElementById('auditionBody').classList.toggle('open');
});

function stopAudition() {
  if (auditionSource) {
    try { auditionSource.stop(); } catch (_) {}
    auditionSource = null;
  }
  if (auditionLabel) {
    const prev = document.querySelector(`.audition-item button[data-label="${CSS.escape(auditionLabel)}"]`);
    if (prev) { prev.textContent = 'Play'; prev.classList.remove('playing'); }
    auditionLabel = null;
  }
}

function playAudition(label) {
  if (!ctx || !buffers[label]) return;
  if (auditionLabel === label) { stopAudition(); return; }
  stopAudition();
  const src = ctx.createBufferSource();
  src.buffer = buffers[label];
  src.connect(masterGain);
  src.onended = () => {
    if (auditionLabel === label) stopAudition();
  };
  src.start();
  auditionSource = src;
  auditionLabel = label;
  const btn = document.querySelector(`.audition-item button[data-label="${CSS.escape(label)}"]`);
  if (btn) { btn.textContent = 'Stop'; btn.classList.add('playing'); }
  logEvent('audition', label);
}

function buildAuditionPanel() {
  const body = document.getElementById('auditionBody');
  body.innerHTML = '';
  if (!profile) return;

  const groups = [];

  // Base beds
  if (profile.beds?.base?.sources?.length) {
    groups.push({ name: 'Base Beds', sources: profile.beds.base.sources });
  }

  // Directional beds
  for (const [dir, cfg] of Object.entries(profile.beds?.directional || {})) {
    if (cfg.sources?.length) {
      groups.push({ name: `Dir — ${dir.toUpperCase()}`, sources: cfg.sources });
    }
  }

  // Weather
  for (const [type, cfg] of Object.entries(profile.weather || {})) {
    if (cfg.sources?.length) {
      groups.push({ name: `Weather — ${type}`, sources: cfg.sources });
    }
  }

  // Micro-events
  for (const evt of profile.microEvents || []) {
    if (evt.sources?.length) {
      groups.push({ name: `Micro — ${evt.id}`, sources: evt.sources });
    }
  }

  for (const grp of groups) {
    const div = document.createElement('div');
    div.className = 'audition-group';
    div.innerHTML = `<div class="audition-group-label">${grp.name}</div>`;
    for (const src of grp.sources) {
      const label = src.label;
      const buf = buffers[label];
      const dur = buf ? buf.duration.toFixed(1) + 's' : '--';
      const item = document.createElement('div');
      item.className = 'audition-item';
      item.innerHTML = `<button data-label="${label}">Play</button><span class="label">${label}</span><span class="dur">${dur}</span>`;
      item.querySelector('button').addEventListener('click', () => playAudition(label));
      div.appendChild(item);
    }
    body.appendChild(div);
  }
}

// ── Profile loader ───────────────────────────────────────────
async function loadProfile(id) {
  profileDot.className = 'dot loading';
  profileLabel.textContent = 'loading...';

  try {
    const res = await fetch(`/audio-profiles/${id}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    profile = await res.json();
    profileLabel.textContent = profile.name || id;

    // Collect all audio URLs from profile
    const urls = new Map();
    function collectSources(sources) {
      if (!sources) return;
      for (const s of sources) {
        if (s.url && s.label) urls.set(s.label, s.url);
      }
    }

    // Base beds
    collectSources(profile.beds?.base?.sources);
    // Directional beds
    for (const dir of Object.values(profile.beds?.directional || {})) {
      collectSources(dir.sources);
    }
    // Weather
    collectSources(profile.weather?.wind?.sources);
    collectSources(profile.weather?.rain?.sources);
    collectSources(profile.weather?.snow?.sources);
    collectSources(profile.weather?.thunder?.sources);
    // Micro-events
    for (const evt of (profile.microEvents || [])) {
      collectSources(evt.sources);
    }

    // Decode all buffers
    if (!ctx) initAudioContext();
    let loaded = 0;
    const total = urls.size;
    profileLabel.textContent = `loading 0/${total}...`;

    const entries = [...urls.entries()];
    // Load in parallel batches of 4
    for (let i = 0; i < entries.length; i += 4) {
      const batch = entries.slice(i, i + 4);
      await Promise.all(batch.map(async ([label, url]) => {
        try {
          const resp = await fetch(url);
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const arrayBuf = await resp.arrayBuffer();
          buffers[label] = await ctx.decodeAudioData(arrayBuf);
        } catch (e) {
          console.warn(`[AudioEngine] CDN fetch failed for ${label}, generating procedural audio`);
          try {
            buffers[label] = ProceduralAudio.generateForLabel(ctx, label);
          } catch (pe) {
            console.warn(`[AudioEngine] Procedural fallback also failed for ${label}: ${pe.message}`);
          }
        }
        loaded++;
        profileLabel.textContent = `loading ${loaded}/${total}...`;
      }));
    }

    const cdnCount = Object.values(buffers).filter(b => b && b.duration > 20).length;
    const procCount = Object.keys(buffers).length - cdnCount;
    profileDot.className = 'dot ok';
    profileLabel.textContent = `${profile.name} (${Object.keys(buffers).length}/${total}${procCount > 0 ? ` · ${procCount} synth` : ''})`;
    logEvent('profile', `loaded ${id} — ${Object.keys(buffers).length}/${total} assets${procCount > 0 ? ` (${procCount} procedural)` : ''}`);
    buildAuditionPanel();
  } catch (e) {
    profileDot.className = 'dot err';
    profileLabel.textContent = `error: ${e.message}`;
    console.error('[AudioEngine] Profile load failed:', e);
  }
}

// ── AudioContext init ────────────────────────────────────────
function initAudioContext() {
  ctx = new AudioContext();
  masterGain = ctx.createGain();
  masterGain.gain.value = (masterSlider.value / 100) * MASTER_MAX_GAIN;
  masterGain.connect(ctx.destination);
}

// ═══════════════════════════════════════════════════════════════
//  LAYER 1: Base Bed — Crossfade-rotating broadband ambience
// ═══════════════════════════════════════════════════════════════

class BaseBedLayer {
  constructor(ctx, masterGain, profile, buffers) {
    this.ctx = ctx;
    this.output = ctx.createGain();
    this.output.gain.value = dbToLin(profile.beds?.base?.gainDb ?? -12);
    this.output.connect(masterGain);

    this.sources = (profile.beds?.base?.sources || []).map(s => s.label);
    this.crossfadeSec = profile.beds?.base?.crossfadeSec ?? 10;
    this.buffers = buffers;

    this.currentIdx = 0;
    this.nodeA = null;
    this.gainA = null;
    this.nodeB = null;
    this.gainB = null;
    this.crossfading = false;
    this.startedAt = 0;
    this.currentDuration = 0;

    // LFO for breathing
    this.lfo = ctx.createGain();
    this.lfo.gain.value = 1;
    this.lfo.connect(this.output);
    this._lfoPhase = Math.random() * Math.PI * 2;
  }

  start() {
    if (this.sources.length === 0) return;
    this._startSource('A');
  }

  _getNextIdx() {
    if (this.sources.length <= 1) return 0;
    let next;
    do { next = Math.floor(Math.random() * this.sources.length); } while (next === this.currentIdx);
    return next;
  }

  _startSource(slot) {
    const label = this.sources[this.currentIdx];
    const buf = this.buffers[label];
    if (!buf) return;

    const node = this.ctx.createBufferSource();
    node.buffer = buf;
    node.loop = true;  // Loop individual buffers for base bed continuity
    const gain = this.ctx.createGain();
    gain.gain.value = (slot === 'A') ? 1 : 0;
    node.connect(gain);
    gain.connect(this.lfo);

    // Start at random offset for variety
    const offset = Math.random() * buf.duration;
    node.start(0, offset);

    if (slot === 'A') {
      this.nodeA = node;
      this.gainA = gain;
    } else {
      this.nodeB = node;
      this.gainB = gain;
    }

    this.startedAt = this.ctx.currentTime;
    this.currentDuration = buf.duration;
  }

  update(worldState, dt) {
    if (!worldState) return;

    // Derive gain from baseNoiseFloorDb
    const noiseDb = worldState.controls?.audio?.baseNoiseFloorDb ?? 30;
    const targetGain = dbToLin(clamp(noiseDb - 30, -30, 0));
    this.output.gain.setTargetAtTime(targetGain, this.ctx.currentTime, RAMP);

    // LFO breathing (subtle 1-2 dB modulation, 20s period)
    this._lfoPhase += dt * (2 * Math.PI / 20);
    const lfoVal = 1 + 0.1 * Math.sin(this._lfoPhase);
    this.lfo.gain.setTargetAtTime(lfoVal, this.ctx.currentTime, 0.5);

    // Trigger crossfade when nodeA has been playing for 80% of duration
    if (this.nodeA && !this.crossfading && this.sources.length > 1) {
      const elapsed = this.ctx.currentTime - this.startedAt;
      if (elapsed > Math.max(30, this.currentDuration * 0.8)) {
        this._beginCrossfade();
      }
    }
  }

  _beginCrossfade() {
    this.crossfading = true;
    this.currentIdx = this._getNextIdx();
    this._startSource('B');

    const now = this.ctx.currentTime;
    const dur = this.crossfadeSec;

    // Fade A out, B in
    this.gainA.gain.setValueAtTime(this.gainA.gain.value, now);
    this.gainA.gain.linearRampToValueAtTime(0, now + dur);
    this.gainB.gain.setValueAtTime(0, now);
    this.gainB.gain.linearRampToValueAtTime(1, now + dur);

    // After crossfade, swap
    setTimeout(() => {
      try { this.nodeA.stop(); } catch (_) {}
      this.nodeA = this.nodeB;
      this.gainA = this.gainB;
      this.nodeB = null;
      this.gainB = null;
      this.crossfading = false;
      this.startedAt = this.ctx.currentTime;
    }, dur * 1000 + 100);

    logEvent('bed-xfade', this.sources[this.currentIdx]);
  }

  getLevel() {
    return this.output.gain.value;
  }

  panic() {
    this.output.gain.setTargetAtTime(0, this.ctx.currentTime, 0.3);
  }

  resume() {
    // Will restore on next update()
  }

  dispose() {
    try { this.nodeA?.stop(); } catch (_) {}
    try { this.nodeB?.stop(); } catch (_) {}
    this.output.disconnect();
  }
}

// ═══════════════════════════════════════════════════════════════
//  LAYER 2: Directional Beds — N/E/S/W anchored sources
// ═══════════════════════════════════════════════════════════════

class DirectionalBedsLayer {
  constructor(ctx, masterGain, profile, buffers) {
    this.ctx = ctx;
    this.output = ctx.createGain();
    this.output.gain.value = dbToLin(profile.mix?.layerGains?.directionalBeds ?? -3);
    this.output.connect(masterGain);

    this.directions = {};
    const dirConfig = profile.beds?.directional || {};
    const panMap = { N: 0, E: 1, S: 0, W: -1 };
    const facingAngle = { N: 0, E: 90, S: 180, W: 270 };

    for (const [dir, config] of Object.entries(dirConfig)) {
      const sources = config.sources || [];
      if (sources.length === 0) continue;

      const baseGainDb = config.gainDb ?? -18;

      // Per-direction parent gain — modulated by wind direction at runtime,
      // and the splice point for occlusion filters. Each layered source
      // (near/mid/far) feeds into this through its own panner+distance chain.
      const parentGain = ctx.createGain();
      parentGain.gain.value = dbToLin(baseGainDb);
      parentGain.connect(this.output);

      const layerEntries = sources.map(s => {
        const spatial = s.spatial || null;
        const panner = spatial
          ? createSpatialPanner(ctx, spatial)
          : createSpatialPanner(ctx, null, { pan: panMap[dir] ?? 0 });

        const sourceGain = ctx.createGain();
        sourceGain.gain.value = dbToLin(s.gainOffsetDb ?? 0);

        const distFilter = spatial ? createDistanceFilter(ctx, spatial.distance ?? 0.5) : null;
        if (distFilter) {
          sourceGain.connect(distFilter);
          distFilter.connect(panner.node);
        } else {
          sourceGain.connect(panner.node);
        }
        panner.node.connect(parentGain);

        return { label: s.label, sourceGain, panner, distFilter, node: null };
      });

      this.directions[dir] = {
        layers: layerEntries,
        parentGain,
        baseGainDb,
        facingAngle: facingAngle[dir] ?? 0,
      };
    }

    this.buffers = buffers;
  }

  start() {
    for (const dir of Object.keys(this.directions)) {
      this._startDirection(dir);
    }
  }

  _startDirection(dir) {
    const d = this.directions[dir];
    if (!d || !d.layers || d.layers.length === 0) return;

    for (const layer of d.layers) {
      const buf = this.buffers[layer.label];
      if (!buf) continue;
      const node = this.ctx.createBufferSource();
      node.buffer = buf;
      node.loop = true;
      // Randomize start offset per layer so loops don't phase-align
      node.start(0, Math.random() * buf.duration);
      node.connect(layer.sourceGain);
      layer.node = node;
    }
  }

  update(worldState, dt) {
    if (!worldState) return;
    const audio = worldState.controls?.audio;
    if (!audio) return;

    const activity = audio.activityLevel ?? 0.5;
    const windDir = audio.windDirection ?? 0;
    const now = this.ctx.currentTime;

    // Layer-level gain from activity (existing behavior)
    const layerGain = dbToLin(-3) * clamp(activity * 2, 0.2, 1);
    this.output.gain.setTargetAtTime(layerGain, now, RAMP * 2);

    // Per-direction gain modulation from wind direction
    // Wind FROM a direction carries sound from that side toward listener
    const DEG2RAD = Math.PI / 180;
    const MOD_DB = 3; // ±3dB modulation range
    for (const d of Object.values(this.directions)) {
      const angleDiff = (windDir - d.facingAngle) * DEG2RAD;
      const modDb = Math.cos(angleDiff) * MOD_DB;
      // Preserve occlusion attenuation: applyOcclusion() stores a static
      // multiplier we re-apply every tick, since setTargetAtTime overwrites.
      const occMul = d.occlusionGainMul ?? 1;
      const targetGain = dbToLin(d.baseGainDb + modDb) * occMul;
      d.parentGain.gain.setTargetAtTime(targetGain, now, RAMP);
    }
  }

  getLevel() {
    return this.output.gain.value;
  }

  panic() {
    this.output.gain.setTargetAtTime(0, this.ctx.currentTime, 0.3);
  }

  resume() {}

  /**
   * Apply static occlusion filters to directional beds.
   * Behind-listener directions get room LPF + gain reduction.
   */
  applyOcclusion(occLayer) {
    if (!occLayer) return;
    for (const [dir, d] of Object.entries(this.directions)) {
      const result = occLayer.createDirectionalBedFilter(dir);
      if (!result) continue;

      // Splice filter post-pan: parentGain → filter → output (was → output directly).
      d.parentGain.disconnect();
      d.parentGain.connect(result.filter);
      result.filter.connect(this.output);

      // Store the multiplier so update() can re-apply it each tick — a bare
      // *= here would be clobbered the next time setTargetAtTime fires.
      d.occlusionGainMul = result.gainMul;
      d.occlusionFilter = result.filter;
    }
  }

  dispose() {
    for (const d of Object.values(this.directions)) {
      for (const layer of (d.layers || [])) {
        try { layer.node?.stop(); } catch (_) {}
      }
      if (d.occlusionFilter) d.occlusionFilter.disconnect();
    }
    this.output.disconnect();
  }
}

// ═══════════════════════════════════════════════════════════════
//  LAYER 3: Micro-Event Scheduler
// ═══════════════════════════════════════════════════════════════

/**
 * Interpolate diurnal ecology weight for a given timeOfDayPhase.
 * Maps timePhase (0-1, 0=midnight) to ecology periods (dawn/day/dusk/night)
 * with smooth cosine interpolation between adjacent periods.
 * @param {{ dawn: number, day: number, dusk: number, night: number }} weights
 * @param {number} timePhase - 0-1 (0=midnight, 0.25=dawn, 0.5=noon, 0.75=dusk)
 * @returns {number} Weight 0-1
 */
function diurnalWeightAt(weights, timePhase) {
  // Period centers in timePhase space (0-1 where 0=midnight)
  // night=0.0, dawn=0.25, day=0.5, dusk=0.75
  const periods = [
    { center: 0.0,  w: weights.night ?? 0 },
    { center: 0.25, w: weights.dawn  ?? 0 },
    { center: 0.5,  w: weights.day   ?? 0 },
    { center: 0.75, w: weights.dusk  ?? 0 },
    { center: 1.0,  w: weights.night ?? 0 },  // wrap
  ];

  // Find surrounding periods and interpolate
  for (let i = 0; i < periods.length - 1; i++) {
    if (timePhase >= periods[i].center && timePhase <= periods[i + 1].center) {
      const range = periods[i + 1].center - periods[i].center;
      const t = range > 0 ? (timePhase - periods[i].center) / range : 0;
      // Cosine interpolation for smooth transitions
      const blend = 0.5 * (1 - Math.cos(t * Math.PI));
      return periods[i].w * (1 - blend) + periods[i + 1].w * blend;
    }
  }
  return weights.day ?? 0.5;
}

/**
 * Activity multiplier curve based on time of day.
 * Models realistic urban activity: quiet at 3am, building at 7am, peak at noon, taper at 10pm.
 * @param {number} timePhase - 0-1 (0=midnight)
 * @returns {number} Multiplier 0-1
 */
function activityMultiplierAt(timePhase) {
  // Piecewise linear curve:
  // 0.0 (midnight) → 0.1, 0.125 (3am) → 0.05, 0.25 (6am) → 0.4,
  // 0.33 (8am) → 0.8, 0.5 (noon) → 1.0, 0.75 (6pm) → 0.85,
  // 0.875 (9pm) → 0.4, 0.96 (11pm) → 0.15, 1.0 → 0.1
  const points = [
    [0.0, 0.10], [0.125, 0.05], [0.25, 0.40], [0.33, 0.80],
    [0.5, 1.00], [0.75, 0.85], [0.875, 0.40], [0.96, 0.15], [1.0, 0.10]
  ];
  for (let i = 0; i < points.length - 1; i++) {
    if (timePhase <= points[i + 1][0]) {
      const [x0, y0] = points[i];
      const [x1, y1] = points[i + 1];
      const t = (timePhase - x0) / (x1 - x0);
      return y0 + (y1 - y0) * t;
    }
  }
  return 0.1;
}

class MicroEventScheduler {
  constructor(ctx, masterGain, profile, buffers) {
    this.ctx = ctx;
    this.output = ctx.createGain();
    this.output.gain.value = dbToLin(profile.mix?.layerGains?.microEvents ?? -2);
    this.output.connect(masterGain);

    this.buffers = buffers;
    this.pools = (profile.microEvents || []).map(evt => ({
      ...evt,
      // Bag-draw anti-repetition
      bag: [...(evt.sources || []).map(s => s.label)],
      bagOriginal: (evt.sources || []).map(s => s.label),
      lastFiredAt: 0,
      cooldownSec: evt.avgCooldownSec || 30
    }));

    this.scheduling = profile.scheduling || {};
    this.maxConcurrent = this.scheduling.maxConcurrentEvents ?? 3;
    this.globalCooldownSec = this.scheduling.globalCooldownSec ?? 2;
    this.lastGlobalFire = 0;
    this.activeSources = 0;
    this.densityMultiplier = this.scheduling.densityMultipliers?.subtle ?? 0.5;
  }

  setMode(mode) {
    const mults = this.scheduling.densityMultipliers || { subtle: 0.5, present: 1.0, demo: 2.0 };
    this.densityMultiplier = mults[mode] ?? 1.0;
  }

  setOcclusionLayer(layer) {
    this.occlusionLayer = layer;
  }

  tick(worldState) {
    if (!worldState || this.activeSources >= this.maxConcurrent) return;

    const now = this.ctx.currentTime;
    const timePhase = worldState.controls?.audio?.timeOfDayPhase ?? 0.5;
    const activity = worldState.controls?.audio?.activityLevel ?? 0.5;
    const windLevel = worldState.controls?.audio?.windLevel ?? 0;
    const rainLevel = worldState.controls?.audio?.rainLevel ?? 0;
    const gustiness = worldState.controls?.audio?.gustiness ?? 0;

    // Activity curve: modulate effective activity by time of day
    // Quiet at 3am (0.125), building at 7am, peak at noon, taper at 10pm
    const activityCurve = activityMultiplierAt(timePhase);
    const effectiveActivity = activity * activityCurve;

    // Global cooldown
    if (now - this.lastGlobalFire < this.globalCooldownSec) return;

    for (const pool of this.pools) {
      // Cooldown check
      if (now - pool.lastFiredAt < pool.cooldownSec / this.densityMultiplier) continue;

      // Time-of-day constraint
      const tod = pool.timeOfDay;
      if (tod) {
        const inPrimary = timePhase >= tod.min && timePhase <= tod.max;
        const inSecondary = pool.secondaryWindow &&
          timePhase >= pool.secondaryWindow.min && timePhase <= pool.secondaryWindow.max;
        if (!inPrimary && !inSecondary) continue;
      }

      // Activity range (using curve-adjusted activity)
      if (pool.activityRange) {
        if (effectiveActivity < pool.activityRange[0] || effectiveActivity > pool.activityRange[1]) continue;
      }

      // Weather-reactive gating
      if (pool.weatherGate === 'wind') {
        // Wind-gated events: suppress in calm, boost in wind
        if (gustiness < 0.2) continue;
      }
      // Suppress outdoor foley during heavy rain
      if (rainLevel > 0.7 && (pool.id === 'footsteps_street' || pool.id === 'footsteps_sidewalk' ||
          pool.id === 'door_open_close' || pool.id === 'broom_sweep')) {
        continue;
      }

      // Probability roll — modulated by ecology + weather weights
      const dt = 0.1; // scheduler tick interval
      let prob = (1 / pool.cooldownSec) * this.densityMultiplier * dt;
      if (pool.diurnalWeights) {
        prob *= diurnalWeightAt(pool.diurnalWeights, timePhase);
      }
      // Wind-gated events fire more in strong wind
      if (pool.weatherGate === 'wind') {
        prob *= (gustiness + windLevel) * 0.5 + 0.5; // 0.5× to 1.5× range
      }
      if (Math.random() > prob) continue;

      // Priority suppression: skip low-priority events when high-priority is active
      if (this.activeSources > 0 && pool.priority === 'low') continue;

      // Fire!
      this._fire(pool);
      break; // One event per tick
    }
  }

  _fire(pool) {
    // Bag draw
    if (pool.bag.length === 0) {
      pool.bag = [...pool.bagOriginal];
      // Shuffle
      for (let i = pool.bag.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool.bag[i], pool.bag[j]] = [pool.bag[j], pool.bag[i]];
      }
    }

    const label = pool.bag.pop();
    const buf = this.buffers[label];
    if (!buf) return;

    const node = this.ctx.createBufferSource();
    node.buffer = buf;

    // Pitch jitter: ±5% playback rate variation for natural feel
    node.playbackRate.value = 1.0 + (Math.random() - 0.5) * 0.10;

    // Random gain variation ±3dB
    const gain = this.ctx.createGain();
    const baseDb = pool.gainDb ?? -18;
    const varDb = baseDb + (Math.random() - 0.5) * 6;
    gain.gain.value = dbToLin(varDb);

    // Spatial panning: HRTF for v2, stereo for v1
    const spatial = pool.spatial;
    const motion = pool.motion;
    let pannerWrapper;

    if (spatial) {
      // v2: HRTF with azimuth jitter for variety
      const jittered = { ...spatial, azimuth: (spatial.azimuth ?? 0) + (Math.random() - 0.5) * 10 };
      pannerWrapper = createSpatialPanner(this.ctx, jittered);
    } else {
      // v1 fallback: stereo pan with jitter
      const basePan = pool.pan ?? 0;
      pannerWrapper = createSpatialPanner(this.ctx, null, {
        pan: clamp(basePan + (Math.random() - 0.5) * 0.2, -1, 1)
      });
    }

    // Distance filter for HRTF sources
    const distFilter = spatial ? createDistanceFilter(this.ctx, spatial.distance ?? 0.5) : null;

    // Occlusion filters (Layer 5): building-edge diffraction, room LPF, urban canyon
    let occlusionResult = null;
    if (this.occlusionLayer) {
      // For moving sources, use midpoint azimuth for occlusion calculation
      const occSpatial = (motion?.type && motion.type !== 'static' &&
                          motion.azimuthStart != null && motion.azimuthEnd != null)
        ? { ...spatial, azimuth: (motion.azimuthStart + motion.azimuthEnd) / 2 }
        : spatial;
      occlusionResult = this.occlusionLayer.createOcclusionFilters(occSpatial);
    }

    // Wire: node → gain → [distFilter] → [occFilters] → [occGain] → panner → output
    node.connect(gain);
    let lastNode = gain;
    if (distFilter) { lastNode.connect(distFilter); lastNode = distFilter; }
    if (occlusionResult) {
      for (const f of occlusionResult.filters) { lastNode.connect(f); lastNode = f; }
      if (occlusionResult.gainMul < 1.0) {
        const occGain = this.ctx.createGain();
        occGain.gain.value = occlusionResult.gainMul;
        lastNode.connect(occGain);
        lastNode = occGain;
      }
    }
    lastNode.connect(pannerWrapper.node);
    pannerWrapper.node.connect(this.output);

    // Reverb send: tap from gain node with surface-aware level
    let reverbSendGain = null;
    if (reverbBus) {
      const surfaceMul = SURFACE_REVERB_MAP[pool.surface] ?? 1.0;
      reverbSendGain = this.ctx.createGain();
      reverbSendGain.gain.value = reverbBus.reverbSend * surfaceMul;
      gain.connect(reverbSendGain);
      reverbSendGain.connect(reverbBus.send);
    }

    // Motion automation for moving sounds
    if (pannerWrapper.type === 'hrtf' && motion && motion.type && motion.type !== 'static') {
      const now = this.ctx.currentTime;
      const el = spatial.elevation ?? 0;
      const dist = spatial.distance ?? 0.5;

      if (motion.type === 'passby' && motion.azimuthStart != null && motion.azimuthEnd != null) {
        pannerWrapper.scheduleMotion(motion.azimuthStart, motion.azimuthEnd, el, dist, motion.durationSec || 8, now);
      } else if (motion.type === 'approach' && motion.azimuthStart != null && motion.azimuthEnd != null) {
        pannerWrapper.scheduleMotion(motion.azimuthStart, motion.azimuthEnd, el, dist * 0.3, motion.durationSec || 6, now);
      } else if (motion.type === 'recede' && motion.azimuthStart != null && motion.azimuthEnd != null) {
        pannerWrapper.scheduleMotion(motion.azimuthStart, motion.azimuthEnd, el, dist * 1.5, motion.durationSec || 8, now);
      }

      // Doppler pitch shift via playbackRate automation
      if (motion.dopplerFactor > 0) {
        const df = motion.dopplerFactor;
        const dur = motion.durationSec || 8;
        const now = this.ctx.currentTime;

        if (motion.type === 'passby') {
          // Full sweep: high pitch → normal → low pitch
          node.playbackRate.setValueAtTime(1.0 + df * 0.5, now);
          node.playbackRate.linearRampToValueAtTime(1.0, now + dur * 0.5);
          node.playbackRate.linearRampToValueAtTime(1.0 - df * 0.5, now + dur);
        } else if (motion.type === 'approach') {
          // Approaching: high pitch → normal
          node.playbackRate.setValueAtTime(1.0 + df * 0.4, now);
          node.playbackRate.linearRampToValueAtTime(1.0, now + dur);
        } else if (motion.type === 'recede') {
          // Receding: normal → low pitch
          node.playbackRate.setValueAtTime(1.0, now);
          node.playbackRate.linearRampToValueAtTime(1.0 - df * 0.4, now + dur);
        }
      }
    }

    // Onset jitter: ±200ms for natural timing variation
    const onsetDelay = Math.random() * 0.4;
    node.start(this.ctx.currentTime + onsetDelay);
    this.activeSources++;
    pool.lastFiredAt = this.ctx.currentTime;
    this.lastGlobalFire = this.ctx.currentTime;

    node.onended = () => {
      this.activeSources = Math.max(0, this.activeSources - 1);
      gain.disconnect();
      pannerWrapper.node.disconnect();
      if (distFilter) distFilter.disconnect();
      if (reverbSendGain) reverbSendGain.disconnect();
      if (occlusionResult) {
        for (const f of occlusionResult.filters) f.disconnect();
        this.occlusionLayer?.releaseFilters(occlusionResult.filters.length);
      }
    };

    logEvent('micro', `${pool.id} → ${label}`);
  }

  getLevel() {
    return this.output.gain.value;
  }

  panic() {
    this.output.gain.setTargetAtTime(0, this.ctx.currentTime, 0.3);
  }

  resume() {}

  dispose() {
    this.output.disconnect();
  }
}

// ═══════════════════════════════════════════════════════════════
//  LAYER 4: Weather — Wind, Rain, Thunder
// ═══════════════════════════════════════════════════════════════

class WeatherLayer {
  constructor(ctx, masterGain, profile, buffers) {
    this.ctx = ctx;
    this.output = ctx.createGain();
    this.output.gain.value = 1;
    this.output.connect(masterGain);

    this.buffers = buffers;

    // Wind sub-layer with spatial panning
    const windSources = profile.weather?.wind?.sources || [];
    this.windSpatial = windSources[0]?.spatial || null;
    this.windPannerWrapper = this.windSpatial
      ? createSpatialPanner(ctx, this.windSpatial)
      : createSpatialPanner(ctx, null, { pan: 0 });
    this.windPannerWrapper.node.connect(this.output);
    this.windGain = ctx.createGain();
    this.windGain.gain.value = 0;
    this.windGain.connect(this.windPannerWrapper.node);
    this.windNode = null;

    // Gust overlay with bandpass filter + spatial panner
    this.gustGain = ctx.createGain();
    this.gustGain.gain.value = 0;
    this.gustFilter = ctx.createBiquadFilter();
    this.gustFilter.type = 'bandpass';
    this.gustFilter.frequency.value = 600;
    this.gustFilter.Q.value = 0.7;
    const gustSpatial = windSources[1]?.spatial || this.windSpatial;
    this.gustPannerWrapper = gustSpatial
      ? createSpatialPanner(ctx, gustSpatial)
      : createSpatialPanner(ctx, null, { pan: 0 });
    this.gustGain.connect(this.gustFilter);
    this.gustFilter.connect(this.gustPannerWrapper.node);
    this.gustPannerWrapper.node.connect(this.output);
    this.gustNode = null;
    this._gustSweepPhase = Math.random() * Math.PI * 2;

    // Rain sub-layers: light texture (high-freq) + heavy texture (full spectrum)
    this.rainLightGain = ctx.createGain();
    this.rainLightGain.gain.value = 0;
    this.rainLightFilter = ctx.createBiquadFilter();
    this.rainLightFilter.type = 'highpass';
    this.rainLightFilter.frequency.value = 1200;
    this.rainLightGain.connect(this.rainLightFilter);
    this.rainLightFilter.connect(this.output);
    this.rainLightNode = null;

    this.rainHeavyGain = ctx.createGain();
    this.rainHeavyGain.gain.value = 0;
    this.rainHeavyFilter = ctx.createBiquadFilter();
    this.rainHeavyFilter.type = 'highpass';
    this.rainHeavyFilter.frequency.value = 80;
    this.rainHeavyGain.connect(this.rainHeavyFilter);
    this.rainHeavyFilter.connect(this.output);
    this.rainHeavyNode = null;

    // Snow sub-layer with lowpass filter (muffled character)
    this.snowGain = ctx.createGain();
    this.snowGain.gain.value = 0;
    this.snowFilter = ctx.createBiquadFilter();
    this.snowFilter.type = 'lowpass';
    this.snowFilter.frequency.value = 1500;
    this.snowFilter.Q.value = 0.5;
    this.snowGain.connect(this.snowFilter);
    this.snowFilter.connect(this.output);
    this.snowNode = null;

    // Thunder (one-shots managed by micro-event style trigger)
    this.thunderSources = (profile.weather?.thunder?.sources || []).map(s => s.label);
    this.thunderBaseSpatial = (profile.weather?.thunder?.sources || [])[0]?.spatial || null;
    this.thunderCooldown = profile.weather?.thunder?.cooldownRange || [60, 180];
    this.lastThunderAt = 0;

    this.windLabels = (profile.weather?.wind?.sources || []).map(s => s.label);
    this.rainLabels = (profile.weather?.rain?.sources || []).map(s => s.label);
    this.snowLabels = (profile.weather?.snow?.sources || []).map(s => s.label);
    if (this.snowLabels.length === 0) this.snowLabels = ['snow-ambience'];
    this.gustConfig = profile.weather?.wind || {};
  }

  start() {
    // Start wind base loop
    if (this.windLabels.length > 0) {
      const buf = this.buffers[this.windLabels[0]];
      if (buf) {
        this.windNode = this.ctx.createBufferSource();
        this.windNode.buffer = buf;
        this.windNode.loop = true;
        this.windNode.start(0, Math.random() * buf.duration);
        this.windNode.connect(this.windGain);
      }
    }

    // Start gust overlay
    if (this.windLabels.length > 1) {
      const buf = this.buffers[this.windLabels[1]];
      if (buf) {
        this.gustNode = this.ctx.createBufferSource();
        this.gustNode.buffer = buf;
        this.gustNode.loop = true;
        this.gustNode.start(0, Math.random() * buf.duration);
        this.gustNode.connect(this.gustGain);
      }
    }

    // Start rain loops: light texture (first source) + heavy texture (second source or fallback)
    if (this.rainLabels.length > 0) {
      const lightBuf = this.buffers[this.rainLabels[0]];
      if (lightBuf) {
        this.rainLightNode = this.ctx.createBufferSource();
        this.rainLightNode.buffer = lightBuf;
        this.rainLightNode.loop = true;
        this.rainLightNode.start(0, Math.random() * lightBuf.duration);
        this.rainLightNode.connect(this.rainLightGain);
      }
    }
    if (this.rainLabels.length > 1) {
      const heavyBuf = this.buffers[this.rainLabels[1]];
      if (heavyBuf) {
        this.rainHeavyNode = this.ctx.createBufferSource();
        this.rainHeavyNode.buffer = heavyBuf;
        this.rainHeavyNode.loop = true;
        this.rainHeavyNode.start(0, Math.random() * heavyBuf.duration);
        this.rainHeavyNode.connect(this.rainHeavyGain);
      }
    }

    // Start snow loop (procedural fallback if no asset)
    if (this.snowLabels.length > 0) {
      if (!this.buffers[this.snowLabels[0]]) {
        try { this.buffers[this.snowLabels[0]] = ProceduralAudio.generateForLabel(this.ctx, this.snowLabels[0]); } catch (_) {}
      }
      const buf = this.buffers[this.snowLabels[0]];
      if (buf) {
        this.snowNode = this.ctx.createBufferSource();
        this.snowNode.buffer = buf;
        this.snowNode.loop = true;
        this.snowNode.start(0, Math.random() * buf.duration);
        this.snowNode.connect(this.snowGain);
      }
    }
  }

  update(worldState, dt) {
    if (!worldState) return;
    const audio = worldState.controls?.audio;
    if (!audio) return;

    const now = this.ctx.currentTime;

    // Wind gain from windLevel
    const windTarget = dbToLin(-60 + audio.windLevel * 60);
    this.windGain.gain.setTargetAtTime(windTarget, now, RAMP);

    // Wind direction panning
    const windDir = audio.windDirection ?? 0;
    if (this.windPannerWrapper.type === 'hrtf' && this.windSpatial) {
      // v2: rotate HRTF panner to follow wind direction
      const el = this.windSpatial.elevation ?? 0;
      const dist = this.windSpatial.distance ?? 0.3;
      this.windPannerWrapper.setPosition(windDir, el, dist);
      this.gustPannerWrapper.setPosition(windDir * 0.8, el, dist);
    } else {
      // v1: stereo pan from wind direction
      const windDirRad = (windDir * Math.PI) / 180;
      const windPan = clamp(Math.sin(windDirRad), -1, 1);
      this.windPannerWrapper.setPan(windPan);
      this.gustPannerWrapper.setPan(windPan * 0.8);
    }

    // Gust gain from gustiness
    const gustTarget = dbToLin(-60 + audio.gustiness * 50);
    this.gustGain.gain.setTargetAtTime(gustTarget, now, RAMP);

    // Gust filter sweep
    const gustRange = this.gustConfig.gustFilterRange || [200, 2000];
    const sweepPeriod = this.gustConfig.gustSweepPeriod || [8, 20];
    const period = lerp(sweepPeriod[0], sweepPeriod[1], 0.5);
    this._gustSweepPhase += dt * (2 * Math.PI / period);
    const sweepT = (Math.sin(this._gustSweepPhase) + 1) / 2;
    const freq = lerp(gustRange[0], gustRange[1], sweepT);
    this.gustFilter.frequency.setTargetAtTime(freq, now, 0.2);

    // Rain intensity layering: light rain = light texture only, heavy = both
    const rainLevel = audio.rainLevel ?? 0;
    // Light texture: present at all rain levels, fades as heavy takes over
    const lightTarget = dbToLin(-60 + rainLevel * 55) * lerp(1.0, 0.4, rainLevel);
    this.rainLightGain.gain.setTargetAtTime(lightTarget, now, RAMP);
    // Heavy texture: fades in above 30% rain intensity
    const heavyBlend = clamp((rainLevel - 0.3) / 0.7, 0, 1);
    const heavyTarget = dbToLin(-60 + rainLevel * 60) * heavyBlend;
    this.rainHeavyGain.gain.setTargetAtTime(heavyTarget, now, RAMP);

    // Snow gain from snowLevel (softer than rain: max -12dB vs rain's 0dB)
    const snowTarget = dbToLin(-60 + (audio.snowLevel ?? 0) * 48);
    this.snowGain.gain.setTargetAtTime(snowTarget, now, RAMP);
    // Snow filter: heavier snow = more low-end pass-through
    const lpFreq = lerp(800, 2000, audio.snowLevel ?? 0);
    this.snowFilter.frequency.setTargetAtTime(lpFreq, now, RAMP);

    // Thunder trigger with distance model
    if (audio.thunderProb > 0) {
      const timeSinceLast = now - this.lastThunderAt;
      const cooldown = lerp(this.thunderCooldown[1], this.thunderCooldown[0], audio.thunderProb);
      if (timeSinceLast > cooldown && Math.random() < audio.thunderProb * dt * 0.1) {
        this._fireThunder();
      }
    }
  }

  _fireThunder() {
    if (this.thunderSources.length === 0) return;
    const label = pick(this.thunderSources);
    const buf = this.buffers[label];
    if (!buf) return;

    // Distance model: 1-15 km, determines delay and attenuation
    const distanceKm = 1 + Math.random() * 14;
    const delaySec = distanceKm / SPEED_OF_SOUND_KM_S;
    // Attenuation: inverse square, referenced to 1 km
    const attenDb = -20 * Math.log10(distanceKm);
    const baseDb = -6 + Math.random() * -6; // -6 to -12 dB

    this.lastThunderAt = this.ctx.currentTime;

    // Log lightning flash immediately (visual clients can use this)
    logEvent('lightning', `flash at ${distanceKm.toFixed(1)}km — thunder in ${delaySec.toFixed(1)}s`);

    // Schedule thunder after propagation delay
    setTimeout(() => {
      const node = this.ctx.createBufferSource();
      node.buffer = buf;
      const gain = this.ctx.createGain();
      gain.gain.value = dbToLin(baseDb + attenDb);
      // Spatial thunder: HRTF for v2 (high elevation, random azimuth), stereo fallback for v1
      let pannerWrapper;
      if (this.thunderBaseSpatial) {
        const randomAz = (Math.random() - 0.5) * 300; // wide random azimuth
        const el = this.thunderBaseSpatial.elevation ?? 60;
        const normDist = clamp(distanceKm / 15, 0.3, 1.0);
        pannerWrapper = createSpatialPanner(this.ctx, {
          azimuth: randomAz, elevation: el, distance: normDist,
          spread: this.thunderBaseSpatial.spread ?? 180
        });
      } else {
        pannerWrapper = createSpatialPanner(this.ctx, null, {
          pan: clamp((Math.random() - 0.5) * 1.2, -1, 1)
        });
      }
      node.connect(gain);
      gain.connect(pannerWrapper.node);
      pannerWrapper.node.connect(this.output);
      node.start();
      node.onended = () => { gain.disconnect(); pannerWrapper.node.disconnect(); };
      logEvent('thunder', `${label} (${distanceKm.toFixed(1)}km, ${(baseDb + attenDb).toFixed(0)}dB)`);
    }, delaySec * 1000);
  }

  getLevel() {
    return Math.max(this.windGain.gain.value, this.rainLightGain.gain.value, this.rainHeavyGain.gain.value, this.snowGain.gain.value);
  }

  panic() {
    const now = this.ctx.currentTime;
    this.windGain.gain.setTargetAtTime(0, now, 0.3);
    this.gustGain.gain.setTargetAtTime(0, now, 0.3);
    this.rainLightGain.gain.setTargetAtTime(0, now, 0.3);
    this.rainHeavyGain.gain.setTargetAtTime(0, now, 0.3);
    this.snowGain.gain.setTargetAtTime(0, now, 0.3);
  }

  resume() {}

  dispose() {
    try { this.windNode?.stop(); } catch (_) {}
    try { this.gustNode?.stop(); } catch (_) {}
    try { this.rainLightNode?.stop(); } catch (_) {}
    try { this.rainHeavyNode?.stop(); } catch (_) {}
    try { this.snowNode?.stop(); } catch (_) {}
    this.output.disconnect();
  }
}

// ═══════════════════════════════════════════════════════════════
//  LAYER 5: Occlusion Processor
// ═══════════════════════════════════════════════════════════════

class OcclusionProcessor {
  constructor(ctx, profile) {
    this.ctx = ctx;
    this.activeFilterCount = 0;

    const listener = profile.listener || {};
    this.enclosure = listener.enclosure || 'street';
    this.listenerElevation = listener.elevation || 0;

    this.facing = listener.facing || 'E';

    // Only active for v2 profiles with window/indoor enclosure
    this.enabled = isV2Profile(profile) &&
      (this.enclosure === 'open_window' || this.enclosure === 'indoor');
  }

  start() {}

  /**
   * Create occlusion filter nodes for a single audio source.
   * @param {Object} spatial - { azimuth, elevation, distance }
   * @returns {{ filters: BiquadFilterNode[], gainMul: number } | null}
   */
  createOcclusionFilters(spatial) {
    if (!this.enabled || !spatial) return null;

    const filters = [];
    let gainMul = 1.0;

    const azimuth = spatial.azimuth ?? 0;
    const elevation = spatial.elevation ?? 0;
    const distance = spatial.distance ?? 0.5;

    // ── Effect 1: Building-Edge Diffraction ──
    // Listener at open window — sources below (negative elevation) are
    // partially occluded by the building facade / windowsill.
    // Lower elevation → more HF attenuation from diffraction.
    if (elevation < 0 && this.enclosure === 'open_window') {
      const depth = clamp(Math.abs(elevation) / 15, 0, 1);
      if (depth > 0.05) {
        const f = this.ctx.createBiquadFilter();
        f.type = 'lowpass';
        f.frequency.value = lerp(20000, 800, depth);
        f.Q.value = 0.5;
        filters.push(f);
        gainMul *= lerp(1.0, 0.85, depth);
      }
    }

    // ── Effect 2: Room LPF (behind the listener) ──
    // Sources behind the listener must pass through building walls.
    // Azimuths in the profile are relative to listener facing (0=front).
    // >120° off-axis = partially behind, >150° = heavily behind.
    if (this.enclosure === 'open_window' || this.enclosure === 'indoor') {
      const absAz = Math.abs(azimuth);
      if (absAz > 120) {
        const factor = clamp((absAz - 120) / 60, 0, 1);
        const f = this.ctx.createBiquadFilter();
        f.type = 'lowpass';
        f.frequency.value = lerp(16000, 400, factor);
        f.Q.value = 0.5;
        filters.push(f);
        gainMul *= lerp(1.0, 0.25, factor); // ≈ -12dB at 180°
      }
    }

    // ── Effect 3: Urban Canyon Occlusion ──
    // Far sources (distance > 0.6) in a street canyon get additional
    // HF rolloff from multi-bounce reflections off building facades.
    // Stacks with createDistanceFilter (which handles gain rolloff).
    if (distance > 0.6) {
      const factor = clamp((distance - 0.6) / 0.4, 0, 1);
      const f = this.ctx.createBiquadFilter();
      f.type = 'lowpass';
      f.frequency.value = lerp(16000, 3000, factor);
      f.Q.value = 0.7;
      filters.push(f);
    }

    if (filters.length === 0) return null;

    this.activeFilterCount += filters.length;
    logEvent('occlusion',
      `az:${azimuth.toFixed(0)} el:${elevation.toFixed(0)} d:${distance.toFixed(2)} → ${filters.length}f gain:${gainMul.toFixed(2)}`);
    return { filters, gainMul };
  }

  /**
   * Create a static occlusion filter for a directional bed.
   * Only applies room LPF for behind-listener directions.
   * @param {string} direction - Cardinal direction (N/E/S/W)
   * @returns {{ filter: BiquadFilterNode, gainMul: number } | null}
   */
  createDirectionalBedFilter(direction) {
    if (!this.enabled) return null;

    // Directional bed azimuths are absolute (N=0, E=90, S=180, W=270).
    // But profile source azimuths are relative to listener facing.
    // For directional beds, we need to compute the relative angle.
    // Listener faces E (90°). N bed is at 0° absolute = -90° relative (left).
    // S bed is at 180° absolute = +90° relative (right).
    // W bed is at 270° absolute = +180° relative (behind).
    //
    // However, the existing facingAngle in DirectionalBedsLayer uses:
    //   { N: 0, E: 90, S: 180, W: 270 } — these are absolute azimuths.
    // And the listener facing is also stored as absolute (E = 90).
    //
    // Relative azimuth = bed absolute - listener absolute
    const listenerAz = { N: 0, E: 90, S: 180, W: 270 };
    const listenerAbsAz = listenerAz[this.facing] ?? 90;

    const bedAbsAz = { N: 0, E: 90, S: 180, W: 270 }[direction] ?? 0;
    let relAz = bedAbsAz - listenerAbsAz;
    // Normalize to -180..180
    while (relAz > 180) relAz -= 360;
    while (relAz < -180) relAz += 360;

    const absRelAz = Math.abs(relAz);
    if (absRelAz <= 120) return null;

    const factor = clamp((absRelAz - 120) / 60, 0, 1);
    const f = this.ctx.createBiquadFilter();
    f.type = 'lowpass';
    f.frequency.value = lerp(16000, 400, factor);
    f.Q.value = 0.5;

    const gainMul = lerp(1.0, 0.25, factor);
    this.activeFilterCount++;
    logEvent('occlusion', `dir:${direction} relAz:${relAz.toFixed(0)} → LPF:${f.frequency.value.toFixed(0)}Hz gain:${gainMul.toFixed(2)}`);
    return { filter: f, gainMul };
  }

  /** Called when a source with occlusion filters ends. */
  releaseFilters(count) {
    this.activeFilterCount = Math.max(0, this.activeFilterCount - count);
  }

  update(worldState, dt) {
    // Occlusion is geometry-based, not weather-dependent.
    // Future: could modulate window open/closed state from worldState.
  }

  getLevel() {
    return Math.min(this.activeFilterCount / 10, 1.0);
  }

  getStatus() {
    if (!this.enabled) return 'off';
    return this.activeFilterCount > 0
      ? `${this.activeFilterCount} active` : 'idle';
  }

  panic() { /* Filters are owned by source nodes — no-op */ }
  resume() {}
  dispose() { this.activeFilterCount = 0; }
}

// ═══════════════════════════════════════════════════════════════
//  ENGINE LIFECYCLE
// ═══════════════════════════════════════════════════════════════

async function startEngine() {
  if (!profile && currentProfileId) await loadProfile(currentProfileId);
  if (!profile) {
    logEvent('engine', 'no audio profile — weather-only mode');
    profileDot.className = 'dot warn';
    profileLabel.textContent = 'no profile — weather only';
    return;
  }
  if (!ctx) initAudioContext();
  if (ctx.state === 'suspended') await ctx.resume();

  // Configure listener orientation for v2 spatial profiles
  configureListener(ctx, profile);

  // Set up environment convolution reverb (v2 profiles with irProfile)
  reverbBus = await createEnvironmentReverb(ctx, profile);
  if (reverbBus) {
    // Parallel send: masterGain → dry → destination (already connected)
    // Plus: masterGain → reverbBus.send → convolver → wet → destination
    reverbBus.wet.connect(ctx.destination);
    logEvent('reverb', `IR: ${reverbBus.irSource}, send: ${reverbBus.reverbSend}`);
  }

  // Create layers
  baseBedLayer = new BaseBedLayer(ctx, masterGain, profile, buffers);
  directionalLayer = new DirectionalBedsLayer(ctx, masterGain, profile, buffers);
  microEventScheduler = new MicroEventScheduler(ctx, masterGain, profile, buffers);
  weatherLayer = new WeatherLayer(ctx, masterGain, profile, buffers);

  // Layer 5: Occlusion processor (building-edge diffraction, room LPF, urban canyon)
  occlusionLayer = new OcclusionProcessor(ctx, profile);
  occlusionLayer.start();
  directionalLayer.applyOcclusion(occlusionLayer);
  microEventScheduler.setOcclusionLayer(occlusionLayer);

  microEventScheduler.setMode(currentMode);

  // Start all layers
  baseBedLayer.start();
  directionalLayer.start();
  weatherLayer.start();

  // Start scheduler (100ms tick)
  schedulerInterval = setInterval(() => {
    if (!running || panicEngaged || !currentState) return;
    microEventScheduler.tick(currentState);
  }, 100);

  running = true;
  btnStart.textContent = 'Stop';
  btnStart.classList.add('active');
  logEvent('engine', 'started');
  updateMeters();
}

function stopEngine() {
  running = false;
  if (schedulerInterval) {
    clearInterval(schedulerInterval);
    schedulerInterval = null;
  }

  baseBedLayer?.dispose();
  directionalLayer?.dispose();
  microEventScheduler?.dispose();
  weatherLayer?.dispose();
  occlusionLayer?.dispose();

  // Disconnect reverb bus (convolver tail would otherwise ring out)
  if (reverbBus) {
    reverbBus.send.disconnect();
    reverbBus.convolver.disconnect();
    reverbBus.wet.disconnect();
    reverbBus.dry.disconnect();
    reverbBus = null;
  }

  baseBedLayer = null;
  directionalLayer = null;
  microEventScheduler = null;
  weatherLayer = null;
  occlusionLayer = null;

  btnStart.textContent = 'Start';
  btnStart.classList.remove('active');
  logEvent('engine', 'stopped');
}

// ── Update loop (driven by WebSocket messages) ───────────────
async function onWorldState(state) {
  currentState = state;

  if (state.engine) {
    timeEl.textContent = state.engine.simTime || '--';
    locEl.textContent = state.engine.location || '--';

    // Dynamic profile switching: reload if server reports a different profile
    const serverProfileId = state.engine.audioProfileId;
    if (serverProfileId && serverProfileId !== currentProfileId) {
      currentProfileId = serverProfileId;
      if (running) {
        stopEngine();
        await loadProfile(currentProfileId);
        await startEngine();
      } else {
        await loadProfile(currentProfileId);
      }
      return; // state will update on next message after reload
    }
    if (!serverProfileId && !currentProfileId && !profile) {
      profileDot.className = 'dot warn';
      profileLabel.textContent = 'no profile — weather only';
    }
  }
  showStates(state.states);

  if (!running || panicEngaged) return;

  const now = performance.now() / 1000;
  const dt = lastUpdateTime > 0 ? now - lastUpdateTime : 0.1;
  lastUpdateTime = now;

  baseBedLayer?.update(state, dt);
  directionalLayer?.update(state, dt);
  weatherLayer?.update(state, dt);

  updateMeters();
}

function updateMeters() {
  function setMeter(key, level) {
    const m = layerMeters[key];
    if (!m) return;
    const pct = clamp(level * 400, 0, 100); // scale for visibility
    m.meter.style.width = pct + '%';
    m.meter.classList.toggle('live', running && level > 0.001);
    m.status.textContent = level > 0.001 ? (20 * Math.log10(level)).toFixed(1) + ' dB' : '--';
  }

  setMeter('bed', baseBedLayer?.getLevel() ?? 0);
  setMeter('dir', directionalLayer?.getLevel() ?? 0);
  setMeter('events', microEventScheduler?.getLevel() ?? 0);
  setMeter('weather', weatherLayer?.getLevel() ?? 0);

  // Layer 5: Occlusion uses filter count instead of audio level
  if (occlusionLayer) {
    const m = layerMeters.occlusion;
    if (m) {
      const count = occlusionLayer.activeFilterCount;
      m.meter.style.width = clamp(count * 8, 0, 100) + '%';
      m.meter.classList.toggle('live', running && count > 0);
      m.status.textContent = occlusionLayer.getStatus();
    }
  } else {
    const m = layerMeters.occlusion;
    if (m) m.status.textContent = 'off';
  }
}

function showStates(states) {
  if (!states) return;
  const audio = currentState?.controls?.audio;
  let html = Object.entries(states)
    .map(([k, v]) => `<div>${k}: <span class="val">${v}</span></div>`)
    .join('');
  if (audio) {
    html += `<div style="margin-top:6px;border-top:1px solid #1a1a1a;padding-top:6px;">`;
    html += `gustiness: <span class="val">${(audio.gustiness ?? 0).toFixed(2)}</span> `;
    html += `thunder: <span class="val">${(audio.thunderProb ?? 0).toFixed(2)}</span> `;
    html += `snow: <span class="val">${(audio.snowLevel ?? 0).toFixed(2)}</span> `;
    html += `windDir: <span class="val">${(audio.windDirection ?? 0).toFixed(0)}&deg;</span><br>`;
    html += `activity: <span class="val">${(audio.activityLevel ?? 0).toFixed(2)}</span> `;
    html += `phase: <span class="val">${(audio.timeOfDayPhase ?? 0).toFixed(3)}</span>`;
    html += `</div>`;
  }
  statesEl.innerHTML = html;
}

// ── Panic ────────────────────────────────────────────────────
function engagePanic() {
  panicEngaged = true;
  btnPanic.classList.add('engaged');
  baseBedLayer?.panic();
  directionalLayer?.panic();
  microEventScheduler?.panic();
  weatherLayer?.panic();
  occlusionLayer?.panic();
  logEvent('PANIC', 'engaged');
}

function releasePanic() {
  panicEngaged = false;
  btnPanic.classList.remove('engaged');
  // Layers will restore on next update()
  logEvent('PANIC', 'released');
}

// ── Controls ─────────────────────────────────────────────────
btnStart.addEventListener('click', () => running ? stopEngine() : startEngine());

btnPanic.addEventListener('mousedown', engagePanic);
btnPanic.addEventListener('mouseup', releasePanic);
btnPanic.addEventListener('mouseleave', () => { if (panicEngaged) releasePanic(); });

masterSlider.addEventListener('input', () => {
  const pct = masterSlider.value;
  masterValEl.textContent = pct + '%';
  if (masterGain) {
    masterGain.gain.setTargetAtTime((pct / 100) * MASTER_MAX_GAIN, ctx.currentTime, 0.1);
  }
});

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    currentMode = btn.dataset.mode;
    microEventScheduler?.setMode(currentMode);
    logEvent('mode', currentMode);
  });
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); if (!panicEngaged) engagePanic(); }
  if (e.key === '1') document.querySelector('[data-mode="subtle"]').click();
  if (e.key === '2') document.querySelector('[data-mode="present"]').click();
  if (e.key === '3') document.querySelector('[data-mode="demo"]').click();
});
document.addEventListener('keyup', (e) => {
  if (e.code === 'Space' && panicEngaged) releasePanic();
});

// ── WebSocket ────────────────────────────────────────────────
function connectWs() {
  if (ws) return;
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    wsDot.className = 'dot ok';
    wsLabel.textContent = 'connected';
    if (reconTimer) { clearInterval(reconTimer); reconTimer = null; }
  };

  ws.onmessage = (e) => {
    try {
      const state = JSON.parse(e.data);
      onWorldState(state);
    } catch (_) {}
  };

  ws.onclose = () => {
    wsDot.className = 'dot err';
    wsLabel.textContent = 'disconnected';
    ws = null;
    scheduleReconnect();
  };
  ws.onerror = () => ws.close();
}

function scheduleReconnect() {
  if (reconTimer) return;
  reconTimer = setInterval(() => { if (!ws) connectWs(); }, 3000);
}

// ── Init ─────────────────────────────────────────────────────
connectWs();
// No default profile load — wait for engine to provide audioProfileId via WebSocket
profileDot.className = 'dot warn';
profileLabel.textContent = 'waiting for engine...';
</script>
