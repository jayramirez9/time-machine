<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Machine — Audio Engine</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
    background: #0a0a0a;
    color: #999;
    padding: 24px;
    font-size: 13px;
    max-width: 640px;

  }
  .dot {
    width: 6px; height: 6px; border-radius: 50%; background: #333;
  }
  .dot.ok { background: #2a6; }
  .dot.err { background: #a33; }
  .dot.warn { background: #a82; }
  .dot.loading { background: #a82; }

  .info { font-size: 11px; color: #555; margin-bottom: 16px; }
  .info span { color: #888; }

  .controls {
    display: flex; gap: 8px; align-items: center;
    margin-bottom: 20px; flex-wrap: wrap;
  }

  button {
    font-family: inherit; font-size: 12px;
    background: #1a1a1a; color: #aaa;
    border: 1px solid #333; padding: 6px 16px; cursor: pointer;
  }
  button:hover { border-color: #555; color: #ccc; }
  button.active { border-color: #2a6; color: #2a6; }
  button.panic { border-color: #a33; color: #a33; }
  button.panic:hover { background: #1a0a0a; }
  button.panic.engaged { background: #300; border-color: #f44; color: #f44; }

  .mode-btn.selected { border-color: #28a; color: #28a; }

  .section-label {
    font-size: 10px; color: #444; text-transform: uppercase;
    letter-spacing: 1px; margin: 16px 0 8px;
  }

  .slider-row {
    display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
  }
  .slider-row label { font-size: 11px; color: #666; min-width: 60px; }
  .slider-row input[type=range] { flex: 1; accent-color: #2a6; }
  .slider-row .val { font-size: 11px; color: #555; min-width: 40px; text-align: right; font-variant-numeric: tabular-nums; }

  .layer {
    margin-bottom: 8px; padding: 8px 12px;
    background: #111; border: 1px solid #1a1a1a; border-radius: 4px;
  }
  .layer-header {
    display: flex; justify-content: space-between; align-items: center;
  }
  .layer-name { font-size: 11px; color: #666; }
  .layer-status { font-size: 10px; color: #444; font-variant-numeric: tabular-nums; }
  .layer-meter {
    height: 2px; background: #1a1a1a; margin-top: 6px; border-radius: 1px; overflow: hidden;
  }
  .layer-meter-fill {
    height: 100%; background: #333; width: 0%;
    transition: width 0.5s ease;
  }
  .layer-meter-fill.live { background: #2a6; }

  .states {
    font-size: 11px; color: #444; margin-top: 20px;
    border-top: 1px solid #1a1a1a; padding-top: 12px;
  }
  .states div { margin-bottom: 3px; }
  .states .val { color: #666; }

  .event-log {
    font-size: 10px; color: #444; margin-top: 12px;
    max-height: 120px; overflow-y: auto;
    border-top: 1px solid #1a1a1a; padding-top: 8px;
  }
  .event-log div { margin-bottom: 2px; }
  .event-log .time { color: #555; }
  .event-log .name { color: #28a; }

  .audition-panel { margin-top: 16px; border-top: 1px solid #1a1a1a; padding-top: 12px; }
  .audition-toggle {
    font-size: 10px; color: #444; text-transform: uppercase;
    letter-spacing: 1px; cursor: pointer; user-select: none;
  }
  .audition-toggle:hover { color: #666; }
  .audition-toggle::before { content: '\25B6  '; font-size: 8px; }
  .audition-toggle.open::before { content: '\25BC  '; }
  .audition-body { display: none; margin-top: 8px; }
  .audition-body.open { display: block; }
  .audition-group { margin-bottom: 10px; }
  .audition-group-label {
    font-size: 10px; color: #444; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 4px;
  }
  .audition-item {
    display: flex; align-items: center; gap: 6px;
    padding: 3px 0; font-size: 11px; color: #666;
  }
  .audition-item button {
    padding: 2px 8px; font-size: 10px; min-width: 44px;
  }
  .audition-item button.playing { border-color: #28a; color: #28a; }
  .audition-item .label {
    flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .audition-item .dur {
    font-size: 10px; color: #444; min-width: 36px; text-align: right;
    font-variant-numeric: tabular-nums;
  }
</style>

<script>
// ═══════════════════════════════════════════════════════════════
//  Time Machine Audio Engine — 5-layer PRD-compliant soundscape
// ═══════════════════════════════════════════════════════════════

const WS_URL = `ws://${location.host}/stream`;
const MASTER_MAX_GAIN = 0.25;   // Guardrail per PRD
const RAMP = 0.4;               // Gain ramp time constant (sec)
const DEFAULT_PROFILE_ID = null; // no default — wait for engine to provide profile
const SPEED_OF_SOUND_KM_S = 0.343; // km per second

// ── Helpers ──────────────────────────────────────────────────
function dbToLin(db) { return db <= -60 ? 0 : Math.pow(10, db / 20); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function lerp(a, b, t) { return a + (b - a) * clamp(t, 0, 1); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ── Spatial Audio Helpers (v2 HRTF) ────────────────────────
const DISTANCE_SCALE = 30; // normalized 0-1 → 0-30 meters for Web Audio

function isV2Profile(p) { return (p?.schemaVersion ?? 0) >= 2; }

/** Convert ADM coordinates (azimuth/elevation/distance) to Web Audio Cartesian (x=right, y=up, z=-forward) */
function admToCartesian(azDeg, elDeg, dist, scale = DISTANCE_SCALE) {
  const az = azDeg * Math.PI / 180;
  const el = elDeg * Math.PI / 180;
  const d = Math.max(0.01, dist * scale); // avoid zero distance
  return {
    x:  d * Math.cos(el) * Math.sin(az),    // right (+) / left (-)
    y:  d * Math.sin(el),                     // up (+) / down (-)
    z: -d * Math.cos(el) * Math.cos(az)      // front (-) / back (+)
  };
}

/**
 * Factory: create a spatial panner wrapper.
 * If `spatial` is provided (v2 profile), returns HRTF PannerNode.
 * Otherwise returns StereoPannerNode (v1 fallback).
 *
 * Wrapper API: { node, type, setPosition(az,el,dist), scheduleMotion(...), setPan(v) }
 */
function createSpatialPanner(audioCtx, spatial, opts = {}) {
  if (!spatial) {
    // v1 fallback: stereo panner
    const p = audioCtx.createStereoPanner();
    p.pan.value = opts.pan ?? 0;
    return {
      node: p,
      type: 'stereo',
      setPosition() {},
      scheduleMotion() {},
      setPan(v) { p.pan.setTargetAtTime(v, audioCtx.currentTime, RAMP); }
    };
  }

  // v2: HRTF PannerNode
  // Distance attenuation is handled by createDistanceFilter + occlusion,
  // so set refDistance = DISTANCE_SCALE to disable the panner's own rolloff.
  // The panner only provides HRTF directionality.
  const p = audioCtx.createPanner();
  p.panningModel = 'HRTF';
  p.distanceModel = 'inverse';
  p.refDistance = DISTANCE_SCALE;
  p.maxDistance = 1000;
  p.rolloffFactor = 1;
  p.coneInnerAngle = spatial.spread ?? 360;
  p.coneOuterAngle = 360;
  p.coneOuterGain = 0.3;

  const pos = admToCartesian(spatial.azimuth ?? 0, spatial.elevation ?? 0, spatial.distance ?? 0.5);
  if (p.positionX) {
    p.positionX.value = pos.x;
    p.positionY.value = pos.y;
    p.positionZ.value = pos.z;
  } else {
    p.setPosition(pos.x, pos.y, pos.z);
  }

  return {
    node: p,
    type: 'hrtf',
    setPan() {}, // no-op for HRTF
    setPosition(az, el, dist) {
      const c = admToCartesian(az, el, dist);
      if (p.positionX) {
        const t = audioCtx.currentTime;
        p.positionX.setTargetAtTime(c.x, t, RAMP);
        p.positionY.setTargetAtTime(c.y, t, RAMP);
        p.positionZ.setTargetAtTime(c.z, t, RAMP);
      } else {
        p.setPosition(c.x, c.y, c.z);
      }
    },
    scheduleMotion(azStart, azEnd, el, dist, durationSec, startTime) {
      if (!p.positionX) return; // legacy browsers can't automate
      const start = admToCartesian(azStart, el, dist);
      const end = admToCartesian(azEnd, el, dist);
      p.positionX.setValueAtTime(start.x, startTime);
      p.positionY.setValueAtTime(start.y, startTime);
      p.positionZ.setValueAtTime(start.z, startTime);
      p.positionX.linearRampToValueAtTime(end.x, startTime + durationSec);
      p.positionY.linearRampToValueAtTime(end.y, startTime + durationSec);
      p.positionZ.linearRampToValueAtTime(end.z, startTime + durationSec);
    }
  };
}

/** Low-pass filter simulating high-frequency rolloff for distant sources */
function createDistanceFilter(audioCtx, distance) {
  if (distance < 0.3) return null; // close enough — no filtering
  const f = audioCtx.createBiquadFilter();
  f.type = 'lowpass';
  // 0.3 → 16kHz (barely filtered), 1.0 → 2kHz (very muffled)
  f.frequency.value = lerp(16000, 2000, clamp((distance - 0.3) / 0.7, 0, 1));
  f.Q.value = 0.7;
  return f;
}

/**
 * Generate a synthetic IR buffer for use as a fallback.
 * Models the profile's enclosure type with exponentially decaying noise
 * and early reflections from building walls.
 */
function createSyntheticIR(audioCtx, profile) {
  const sampleRate = audioCtx.sampleRate;
  const duration = 0.6; // short street canyon reverb
  const length = Math.floor(sampleRate * duration);
  const buffer = audioCtx.createBuffer(2, length, sampleRate);

  // Enclosure determines reverb character
  const enclosure = profile?.listener?.enclosure || 'street';
  const enclosureConfig = {
    open_window:  { decay: 3.5, hfDamp: 0.6, earlyGain: 0.8 },
    porch:        { decay: 4.0, hfDamp: 0.5, earlyGain: 0.7 },
    street:       { decay: 3.0, hfDamp: 0.7, earlyGain: 1.0 },
    indoor:       { decay: 5.0, hfDamp: 0.4, earlyGain: 0.5 }
  };
  const cfg = enclosureConfig[enclosure] || enclosureConfig.street;

  for (let ch = 0; ch < 2; ch++) {
    const data = buffer.getChannelData(ch);
    // Exponentially decaying noise
    for (let i = 0; i < length; i++) {
      const t = i / sampleRate;
      const envelope = Math.exp(-cfg.decay * t);
      // High-frequency damping: attenuate noise over time
      const hfRoll = 1.0 - cfg.hfDamp * (t / duration);
      data[i] = (Math.random() * 2 - 1) * envelope * Math.max(0, hfRoll);
    }

    // Early reflections: building walls across the street (~12m = ~35ms)
    const reflections = [
      { ms: 12, gain: cfg.earlyGain * 0.6 },   // opposite wall
      { ms: 24, gain: cfg.earlyGain * 0.35 },   // second bounce
      { ms: 36, gain: cfg.earlyGain * 0.2 },    // third bounce
      { ms: 52, gain: cfg.earlyGain * 0.12 }    // up from street
    ];
    for (const r of reflections) {
      const idx = Math.floor(r.ms * sampleRate / 1000);
      if (idx < length) {
        // Stereo spread: slightly different per channel
        const spread = ch === 0 ? 1.0 : 0.85;
        data[idx] += r.gain * spread * (0.8 + Math.random() * 0.4);
      }
    }
  }

  return buffer;
}

/**
 * Create convolution reverb for the environment.
 * Attempts to load a real IR file from the profile's irProfile.file path.
 * Falls back to synthetic IR generation if the file is missing or decode fails.
 * Returns { convolver, wet, dry, send, reverbSend, irSource } or null if no irProfile defined.
 */
async function createEnvironmentReverb(audioCtx, profile) {
  const ir = profile?.spatialConfig?.irProfile;
  if (!ir) return null;

  // Support both legacy string format and new object format
  const irObj = typeof ir === 'string' ? { id: ir } : ir;
  const profileId = profile.id;

  let buffer = null;
  let irSource = 'synthetic';

  // Attempt to load real IR file if specified
  if (irObj.file && profileId) {
    const irUrl = `/audio-assets/${profileId}/${irObj.file}`;
    try {
      const resp = await fetch(irUrl);
      if (resp.ok) {
        const arrayBuf = await resp.arrayBuffer();
        buffer = await audioCtx.decodeAudioData(arrayBuf);
        irSource = 'file';
        logEvent('reverb', `IR loaded from file: ${irUrl} (${buffer.duration.toFixed(2)}s, ${buffer.numberOfChannels}ch)`);
      } else {
        logEvent('reverb', `IR file not found (${resp.status}): ${irUrl}, using ${irObj.fallback || 'synthetic'} fallback`);
      }
    } catch (e) {
      logEvent('reverb', `IR file decode failed: ${e.message}, using ${irObj.fallback || 'synthetic'} fallback`);
    }
  }

  // Fall back to synthetic if no file loaded
  if (!buffer) {
    buffer = createSyntheticIR(audioCtx, profile);
    irSource = 'synthetic';
    logEvent('reverb', `IR: synthetic (enclosure: ${profile?.listener?.enclosure || 'street'})`);
  }

  const convolver = audioCtx.createConvolver();
  convolver.buffer = buffer;

  const wet = audioCtx.createGain();
  const dry = audioCtx.createGain();
  const send = audioCtx.createGain();

  const reverbSend = profile?.mix?.reverbSend ?? 0.12;
  wet.gain.value = reverbSend;
  dry.gain.value = 1.0;
  send.gain.value = 1.0; // per-source send level (adjusted per surface)

  send.connect(convolver);
  convolver.connect(wet);

  return { convolver, wet, dry, send, reverbSend, irSource };
}

/** Surface material → reverb send gain multiplier */
const SURFACE_REVERB_MAP = {
  granite_sett: 1.4,    // +3dB: hard, reflective
  cobblestone: 1.3,     // +2.5dB: hard
  iron_rail: 1.3,       // +2dB: metallic ring
  iron_chute: 1.3,      // +2dB: metallic
  asphalt: 1.0,         // baseline
  wood_plank: 0.8,      // -2dB: absorptive
  dirt: 0.6             // -4dB: very absorptive
};

/** Set AudioContext listener orientation based on profile facing direction */
function configureListener(audioCtx, prof) {
  if (!isV2Profile(prof) || !prof.listener?.facing) return;
  const facingMap = {
    N: { fx: 0, fz: -1 },  // looking into screen (negative Z = forward)
    E: { fx: 1, fz: 0 },
    S: { fx: 0, fz: 1 },
    W: { fx: -1, fz: 0 }
  };
  const f = facingMap[prof.listener.facing] || facingMap.N;
  const listener = audioCtx.listener;
  if (listener.forwardX) {
    listener.forwardX.setValueAtTime(f.fx, audioCtx.currentTime);
    listener.forwardY.setValueAtTime(0, audioCtx.currentTime);
    listener.forwardZ.setValueAtTime(f.fz, audioCtx.currentTime);
    listener.upX.setValueAtTime(0, audioCtx.currentTime);
    listener.upY.setValueAtTime(1, audioCtx.currentTime);
    listener.upZ.setValueAtTime(0, audioCtx.currentTime);
  } else {
    listener.setOrientation(f.fx, 0, f.fz, 0, 1, 0);
  }
}

// ── Procedural Audio Synthesis ──────────────────────────────
// Generates AudioBuffers when CDN assets fail to load
const ProceduralAudio = {
  _sr: 44100,

  // Seeded PRNG for determinism
  _seed: 42,
  _rand() {
    this._seed = (this._seed * 1664525 + 1013904223) & 0x7FFFFFFF;
    return this._seed / 0x7FFFFFFF;
  },
  _whiteNoise(n) {
    const out = new Float32Array(n);
    for (let i = 0; i < n; i++) out[i] = this._rand() * 2 - 1;
    return out;
  },

  // Simple 1-pole lowpass filter applied in-place
  _lowpass(buf, cutoff) {
    const rc = 1 / (2 * Math.PI * cutoff);
    const dt = 1 / this._sr;
    const a = dt / (rc + dt);
    let y = 0;
    for (let i = 0; i < buf.length; i++) {
      y += a * (buf[i] - y);
      buf[i] = y;
    }
    return buf;
  },

  // Simple 1-pole highpass filter applied in-place
  _highpass(buf, cutoff) {
    const rc = 1 / (2 * Math.PI * cutoff);
    const dt = 1 / this._sr;
    const a = rc / (rc + dt);
    let prev = 0, y = 0;
    for (let i = 0; i < buf.length; i++) {
      y = a * (y + buf[i] - prev);
      prev = buf[i];
      buf[i] = y;
    }
    return buf;
  },

  // Normalize buffer to peak amplitude
  _normalize(buf, peak = 0.8) {
    let max = 0;
    for (let i = 0; i < buf.length; i++) max = Math.max(max, Math.abs(buf[i]));
    if (max > 0) {
      const scale = peak / max;
      for (let i = 0; i < buf.length; i++) buf[i] *= scale;
    }
    return buf;
  },

  // Apply fade-in/fade-out for seamless looping
  _fadeEdges(buf, fadeSamples = 2205) {
    const n = Math.min(fadeSamples, buf.length / 4);
    for (let i = 0; i < n; i++) {
      const t = i / n;
      buf[i] *= t;
      buf[buf.length - 1 - i] *= t;
    }
    return buf;
  },

  // ─── Generator functions by sound type ────────────────────

  // Suburban ambient bed: very low-passed noise + gentle modulation
  suburban(ctx, dur = 15) {
    this._seed = 42;
    const n = this._sr * dur;
    const data = this._whiteNoise(n);
    this._lowpass(data, 400);
    // Add slow amplitude modulation for "breathing"
    for (let i = 0; i < n; i++) {
      const t = i / this._sr;
      data[i] *= 0.6 + 0.4 * Math.sin(t * 0.3);
    }
    this._normalize(data, 0.5);
    this._fadeEdges(data);
    return this._makeBuffer(ctx, data);
  },

  // Wind: bandpass-filtered noise with slow amplitude sweep
  wind(ctx, dur = 12) {
    this._seed = 100;
    const n = this._sr * dur;
    const data = this._whiteNoise(n);
    this._lowpass(data, 1200);
    this._highpass(data, 80);
    // Slow whoosh modulation
    for (let i = 0; i < n; i++) {
      const t = i / this._sr;
      data[i] *= 0.5 + 0.5 * Math.sin(t * 0.4 + Math.sin(t * 0.07) * 2);
    }
    this._normalize(data, 0.7);
    this._fadeEdges(data);
    return this._makeBuffer(ctx, data);
  },

  // Wind gust overlay: more aggressive bandpass with faster modulation
  windGust(ctx, dur = 10) {
    this._seed = 200;
    const n = this._sr * dur;
    const data = this._whiteNoise(n);
    this._lowpass(data, 2000);
    this._highpass(data, 200);
    for (let i = 0; i < n; i++) {
      const t = i / this._sr;
      // Irregular gust bursts
      const env = Math.pow(Math.max(0, Math.sin(t * 0.8 + Math.sin(t * 0.2) * 3)), 2);
      data[i] *= env;
    }
    this._normalize(data, 0.6);
    this._fadeEdges(data);
    return this._makeBuffer(ctx, data);
  },

  // Rain: dense high-frequency noise with subtle amplitude texture
  rain(ctx, dur = 12) {
    this._seed = 300;
    const n = this._sr * dur;
    const data = this._whiteNoise(n);
    this._highpass(data, 800);
    this._lowpass(data, 8000);
    // Rapid micro-modulation for raindrop texture
    for (let i = 0; i < n; i++) {
      const t = i / this._sr;
      const drops = 0.7 + 0.3 * Math.sin(t * 40) * Math.sin(t * 13.7);
      data[i] *= drops * (0.8 + 0.2 * Math.sin(t * 0.5));
    }
    this._normalize(data, 0.6);
    this._fadeEdges(data);
    return this._makeBuffer(ctx, data);
  },

  // Snow: soft, muffled ambience — narrower band, lower energy than rain
  snow(ctx, dur = 12) {
    this._seed = 350;
    const n = this._sr * dur;
    const data = this._whiteNoise(n);
    this._lowpass(data, 2000);
    this._highpass(data, 100);
    // Very gentle amplitude modulation — snow is steady
    for (let i = 0; i < n; i++) {
      const t = i / this._sr;
      data[i] *= 0.7 + 0.3 * Math.sin(t * 0.2);
    }
    this._normalize(data, 0.35);
    this._fadeEdges(data);
    return this._makeBuffer(ctx, data);
  },

  // Thunder: low-frequency burst with long decay and crackle
  thunder(ctx, dur = 8) {
    this._seed = 400;
    const n = this._sr * dur;
    const data = this._whiteNoise(n);
    this._lowpass(data, 200);
    // Envelope: sharp attack, long exponential decay with rumble
    for (let i = 0; i < n; i++) {
      const t = i / this._sr;
      const attack = Math.min(1, t * 20);
      const decay = Math.exp(-t * 0.6);
      // Sub-rumble modulation
      const rumble = 1 + 0.3 * Math.sin(t * 8) * Math.sin(t * 3.1);
      data[i] *= attack * decay * rumble;
    }
    // Layer in some mid-frequency crackle
    this._seed = 401;
    const crackle = this._whiteNoise(n);
    this._lowpass(crackle, 3000);
    this._highpass(crackle, 500);
    for (let i = 0; i < n; i++) {
      const t = i / this._sr;
      const cEnv = Math.exp(-t * 2) * 0.15;
      data[i] += crackle[i] * cEnv;
    }
    this._normalize(data, 0.9);
    return this._makeBuffer(ctx, data);
  },

  // Cicada: oscillator buzz with amplitude envelope
  cicada(ctx, dur = 6) {
    const n = this._sr * dur;
    const data = new Float32Array(n);
    const freq = 4200 + (this._rand() * 600); // 4200-4800 Hz
    for (let i = 0; i < n; i++) {
      const t = i / this._sr;
      // Buzzing tone with harmonics
      const osc = Math.sin(t * freq * 2 * Math.PI) * 0.5
                + Math.sin(t * freq * 4 * Math.PI) * 0.25
                + Math.sin(t * freq * 6 * Math.PI) * 0.12;
      // Characteristic rise-sustain-fall envelope
      const env = Math.sin(Math.PI * t / dur) * (0.8 + 0.2 * Math.sin(t * 11));
      data[i] = osc * env;
    }
    this._normalize(data, 0.5);
    return this._makeBuffer(ctx, data);
  },

  // Bird chirp: FM synthesis short burst
  bird(ctx, dur = 3) {
    this._seed = 500 + Math.floor(this._rand() * 1000);
    const n = this._sr * dur;
    const data = new Float32Array(n);
    // Generate 3-6 chirps
    const numChirps = 3 + Math.floor(this._rand() * 4);
    for (let c = 0; c < numChirps; c++) {
      const startT = (c / numChirps) * dur * 0.8;
      const chirpDur = 0.08 + this._rand() * 0.15;
      const baseFreq = 2000 + this._rand() * 3000;
      const freqSlide = (this._rand() - 0.5) * 2000;
      const startSample = Math.floor(startT * this._sr);
      const chirpSamples = Math.floor(chirpDur * this._sr);
      for (let i = 0; i < chirpSamples && (startSample + i) < n; i++) {
        const t = i / this._sr;
        const freq = baseFreq + freqSlide * t / chirpDur;
        const env = Math.sin(Math.PI * i / chirpSamples);
        data[startSample + i] += Math.sin(t * freq * 2 * Math.PI) * env * 0.4;
      }
    }
    this._normalize(data, 0.5);
    return this._makeBuffer(ctx, data);
  },

  // Dog bark: short broadband burst
  dog(ctx, dur = 2) {
    this._seed = 700;
    const n = this._sr * dur;
    const data = new Float32Array(n);
    const numBarks = 2 + Math.floor(this._rand() * 3);
    for (let b = 0; b < numBarks; b++) {
      const startT = b * 0.4 + this._rand() * 0.1;
      const barkDur = 0.12 + this._rand() * 0.08;
      const startSample = Math.floor(startT * this._sr);
      const barkSamples = Math.floor(barkDur * this._sr);
      for (let i = 0; i < barkSamples && (startSample + i) < n; i++) {
        const t = i / this._sr;
        const env = Math.sin(Math.PI * i / barkSamples);
        const tone = Math.sin(t * 400 * 2 * Math.PI) * 0.3
                   + Math.sin(t * 800 * 2 * Math.PI) * 0.2
                   + (this._rand() * 2 - 1) * 0.3;
        data[startSample + i] += tone * env;
      }
    }
    this._lowpass(data, 3000);
    this._normalize(data, 0.5);
    return this._makeBuffer(ctx, data);
  },

  // Car pass-by: low-frequency whoosh with doppler-like pitch shift
  car(ctx, dur = 5) {
    this._seed = 800;
    const n = this._sr * dur;
    const data = this._whiteNoise(n);
    this._lowpass(data, 600);
    for (let i = 0; i < n; i++) {
      const t = i / this._sr;
      const pos = (t / dur) * 2 - 1; // -1 to 1
      // Distance envelope: closest at center
      const dist = 0.3 + Math.abs(pos);
      const env = 1 / (dist * dist);
      data[i] *= Math.min(1, env) * 0.5;
      // Add engine tone
      const engFreq = 120 + 20 * (1 - Math.abs(pos)); // subtle doppler
      data[i] += Math.sin(t * engFreq * 2 * Math.PI) * env * 0.15;
    }
    this._normalize(data, 0.5);
    return this._makeBuffer(ctx, data);
  },

  // Screen door slam: short broadband click + metallic ring
  screenDoor(ctx, dur = 1.5) {
    const n = this._sr * dur;
    const data = new Float32Array(n);
    // Impact click
    this._seed = 900;
    const click = this._whiteNoise(Math.floor(this._sr * 0.02));
    for (let i = 0; i < click.length && i < n; i++) {
      data[i] = click[i] * Math.exp(-i / (this._sr * 0.005));
    }
    // Metallic spring ring
    for (let i = 0; i < n; i++) {
      const t = i / this._sr;
      const ring = Math.sin(t * 1200 * 2 * Math.PI) * 0.3
                 + Math.sin(t * 2400 * 2 * Math.PI) * 0.15
                 + Math.sin(t * 680 * 2 * Math.PI) * 0.1;
      data[i] += ring * Math.exp(-t * 4);
    }
    this._normalize(data, 0.6);
    return this._makeBuffer(ctx, data);
  },

  // Cricket chorus: rapid oscillator pulses
  cricket(ctx, dur = 8) {
    const n = this._sr * dur;
    const data = new Float32Array(n);
    this._seed = 1000;
    const freq = 5500 + this._rand() * 500;
    const pulseRate = 15 + this._rand() * 10; // pulses per second
    for (let i = 0; i < n; i++) {
      const t = i / this._sr;
      // Pulsing envelope
      const pulse = Math.pow(Math.max(0, Math.sin(t * pulseRate * Math.PI)), 8);
      const tone = Math.sin(t * freq * 2 * Math.PI);
      // Overall envelope — fade in/out
      const env = Math.sin(Math.PI * t / dur);
      data[i] = tone * pulse * env * 0.3;
    }
    this._normalize(data, 0.4);
    return this._makeBuffer(ctx, data);
  },

  // Neighborhood ambient (variant of suburban with different seed/tone)
  neighborhood(ctx, dur = 15) {
    this._seed = 1100;
    const n = this._sr * dur;
    const data = this._whiteNoise(n);
    this._lowpass(data, 500);
    this._highpass(data, 40);
    for (let i = 0; i < n; i++) {
      const t = i / this._sr;
      data[i] *= 0.5 + 0.5 * Math.sin(t * 0.2 + Math.sin(t * 0.05) * 1.5);
    }
    this._normalize(data, 0.4);
    this._fadeEdges(data);
    return this._makeBuffer(ctx, data);
  },

  _makeBuffer(ctx, data) {
    const buf = ctx.createBuffer(1, data.length, this._sr);
    buf.getChannelData(0).set(data);
    return buf;
  },

  // Map label patterns to generator functions
  generateForLabel(ctx, label) {
    const l = label.toLowerCase();
    if (l.includes('suburban') || l.includes('backyard'))  return this.suburban(ctx);
    if (l.includes('neighborhood'))                        return this.neighborhood(ctx);
    if (l.includes('road') || l.includes('residential-road')) return this.neighborhood(ctx, 12);
    if (l.includes('wind-gust'))                           return this.windGust(ctx);
    if (l.includes('wind'))                                return this.wind(ctx);
    if (l.includes('rain'))                                return this.rain(ctx);
    if (l.includes('snow'))                                return this.snow(ctx);
    if (l.includes('thunder-roll'))                        return this.thunder(ctx, 10);
    if (l.includes('thunder'))                             return this.thunder(ctx);
    if (l.includes('cicada'))                              return this.cicada(ctx);
    if (l.includes('bird'))                                return this.bird(ctx);
    if (l.includes('dog'))                                 return this.dog(ctx);
    if (l.includes('car'))                                 return this.car(ctx);
    if (l.includes('screen-door'))                         return this.screenDoor(ctx);
    if (l.includes('cricket'))                             return this.cricket(ctx);
    // Fallback: generic ambient
    return this.suburban(ctx, 10);
  }
};
